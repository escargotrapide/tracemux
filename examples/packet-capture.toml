config_version = 1

[server]
bind = "127.0.0.1:9000"
session_root = "tracemux-sessions"
encoding = "utf-8"
detect_mode = "configured"
require_auth = false

[channels.capture]
label = "packet capture"

[channels.capture.spec]
kind = "pcap"
interface = "Ethernet"
display_name = "Ethernet"
promiscuous = false
snaplen = 65535
timeout_ms = 1000
immediate = false
filter = "tcp port 502"
save_mode = "session"
publish_mode = "stats-only"