config_version = 1

[server]
bind = "127.0.0.1:9000"
session_root = "tracemux-sessions"
encoding = "utf-8"
detect_mode = "suggest"
require_auth = false

[server.serial]
open_all = false
ports = ["COM3"]
baud = 115200
data_bits = 8
parity = "none"
stop_bits = 1
flow = "none"

[channels.com3]
label = "COM3 serial"

[channels.com3.spec]
kind = "serial"
port = "COM3"
baud = 115200
data_bits = 8
parity = "none"
stop_bits = 1
flow = "none"