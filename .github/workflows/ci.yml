name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  encoding:
    name: text files are UTF-8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate UTF-8 + LF line endings
        run: |
          set -euo pipefail
          bad=0
          while IFS= read -r -d '' f; do
            if ! iconv -f UTF-8 -t UTF-8 "$f" >/dev/null 2>&1; then
              echo "::error file=$f::not valid UTF-8"
              bad=1
            fi
            if grep -qP '\r' "$f"; then
              echo "::error file=$f::contains CR (use LF)"
              bad=1
            fi
          done < <(git ls-files -z -- '*.rs' '*.md' '*.toml' '*.yml' '*.yaml' '*.sh' '*.ps1' '*.json' justfile)
          exit "$bad"

  rust:
    name: rust ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: EmbarkStudios/cargo-deny-action@v2

  compat:
    name: compat fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: wire / log / cli compat tests
        run: cargo test --workspace --test 'compat_*' --all-features

  rtm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: regenerate RTM and diff
        run: |
          bash scripts/gen-rtm.sh
          git diff --exit-code -- docs/rtm.md
