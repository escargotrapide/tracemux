# cargo-deny configuration
# Run with: cargo deny check

[graph]
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # keyring 2.x -> secret-service/zbus transitively pulls derivative and instant.
    # Both advisories have no safe upgrade path in-place; revisit when moving keyring
    # to a newer major version and revalidating OS keyring behavior.
    "RUSTSEC-2024-0388", # derivative unmaintained
    "RUSTSEC-2024-0384", # instant unmaintained
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # OpenSSL: prefer rustls
    { name = "openssl-sys" },
    { name = "openssl" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
